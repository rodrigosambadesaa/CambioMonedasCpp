name: CI Multiplataforma

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: g++ -std=c++20 -Wall -Wextra -Wpedantic -O2 main.cpp moneda_gestion.cpp bigint.cpp vector_dinamico.cpp -o progvoraz

      - name: Build GUI (Linux portable)
        if: runner.os == 'Linux'
        run: g++ -std=c++20 -Wall -Wextra -Wpedantic -O2 gui_portable.cpp moneda_gestion.cpp bigint.cpp -o progvoraz_gui

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: g++ -std=c++20 -Wall -Wextra -Wpedantic -O2 main.cpp moneda_gestion.cpp bigint.cpp vector_dinamico.cpp -o progvoraz

      - name: Swift toolchain info (macOS)
        if: runner.os == 'macOS'
        run: |
          xcode-select -p
          xcrun swift --version

      - name: Build GUI (macOS Swift)
        if: runner.os == 'macOS'
        run: xcrun --sdk macosx swiftc -parse-as-library gui_macos.swift -o progvoraz_gui_swift

      - name: Build GUI (macOS portable fallback)
        if: runner.os == 'macOS'
        run: g++ -std=c++20 -Wall -Wextra -Wpedantic -O2 gui_portable.cpp moneda_gestion.cpp bigint.cpp -o progvoraz_gui_portable

      - name: Smoke test consola modo a (Linux)
        if: runner.os == 'Linux'
        run: |
          printf "a\neuro\n0\nsalir\n" | ./progvoraz

      - name: Smoke test consola modo b (Linux)
        if: runner.os == 'Linux'
        run: |
          cp stock.txt stock.bak
          printf "b\ndolar\n100\n0\nsalir\n" | ./progvoraz
          mv stock.bak stock.txt

      - name: Smoke test consola modo c (Linux)
        if: runner.os == 'Linux'
        run: |
          cp stock.txt stock.bak
          printf "c\neuro\nanadir\n1\n1\nquitar\n1\n1\nvolver\nsalir\n" | ./progvoraz
          mv stock.bak stock.txt

      - name: Smoke test GUI portable (Linux)
        if: runner.os == 'Linux'
        run: |
          printf "euro\nvolver\nsalir\n" | ./progvoraz_gui

      - name: Smoke test consola modo a (macOS)
        if: runner.os == 'macOS'
        run: |
          printf "a\neuro\n0\nsalir\n" | ./progvoraz

      - name: Smoke test consola modo b (macOS)
        if: runner.os == 'macOS'
        run: |
          cp stock.txt stock.bak
          printf "b\ndolar\n100\n0\nsalir\n" | ./progvoraz
          mv stock.bak stock.txt

      - name: Smoke test consola modo c (macOS)
        if: runner.os == 'macOS'
        run: |
          cp stock.txt stock.bak
          printf "c\neuro\nanadir\n1\n1\nquitar\n1\n1\nvolver\nsalir\n" | ./progvoraz
          mv stock.bak stock.txt

      - name: Smoke test GUI portable (macOS)
        if: runner.os == 'macOS'
        run: |
          printf "euro\nvolver\nsalir\n" | ./progvoraz_gui_portable

      - name: Smoke launch GUI Swift (macOS)
        if: runner.os == 'macOS'
        run: |
          ./progvoraz_gui_swift >/tmp/progvoraz_gui_swift.log 2>&1 &
          GUI_PID=$!
          sleep 3
          if ! kill -0 "$GUI_PID" 2>/dev/null; then
            echo "La GUI Swift termino prematuramente."
            cat /tmp/progvoraz_gui_swift.log
            exit 1
          fi
          kill "$GUI_PID"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: g++ -std=c++20 -Wall -Wextra -Wpedantic -O2 main.cpp moneda_gestion.cpp bigint.cpp vector_dinamico.cpp -o progvoraz.exe

      - name: Build GUI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: g++ -std=c++20 -Wall -Wextra -Wpedantic -O2 gui_window.cpp moneda_gestion.cpp bigint.cpp -o progvoraz_gui.exe -mwindows

      - name: Smoke test consola modo a (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          @"
          a
          euro
          0
          salir
          "@ | .\progvoraz.exe | Out-String

      - name: Smoke test consola modo b (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item stock.txt stock.bak -Force
          @"
          b
          dolar
          100
          0
          salir
          "@ | .\progvoraz.exe | Out-String
          Move-Item stock.bak stock.txt -Force

      - name: Smoke test consola modo c (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item stock.txt stock.bak -Force
          @"
          c
          euro
          anadir
          1
          1
          quitar
          1
          1
          volver
          salir
          "@ | .\progvoraz.exe | Out-String
          Move-Item stock.bak stock.txt -Force

      - name: Smoke launch GUI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath .\progvoraz_gui.exe -PassThru
          Start-Sleep -Seconds 3
          if ($proc.HasExited -and $proc.ExitCode -ne 0) {
            throw "La GUI de Windows termino prematuramente con codigo $($proc.ExitCode)."
          }
          if (-not $proc.HasExited) {
            Stop-Process -Id $proc.Id
          }

